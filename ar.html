<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Vision3D | AR Scanner</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Three.js (r120) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r120/three.min.js"></script>
    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r120/examples/js/loaders/GLTFLoader.js"></script>
    
    <!-- AR.js (Three.js integration) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/three.js/build/ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader"></div>
        <p style="color: #fff; font-weight: 300;">Carregando Motor 3D e Modelos (15MB)...</p>
    </div>

    <!-- UI Overlay -->
    <div class="ar-ui-overlay">
        <div class="ar-header">
            <a href="index.html" class="btn-secondary" style="padding: 8px 16px; font-size: 0.9rem;">← Voltar</a>
            
            <div id="tracking-status" class="ar-status searching">
                <div class="dot"></div>
                <span id="status-text">Buscando Marcador...</span>
            </div>
        </div>
        
        <div class="ar-footer">
            <p style="color: rgba(255,255,255,0.7); font-size: 0.8rem; text-align: center; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px;">
                Mantenha a câmera firme sobre o marcador Hiro
            </p>
        </div>
    </div>

    <!-- The Custom App Script -->
    <script src="app.js"></script>
</body>
</html>
