<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vision3D — AR Experience</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
        /* ─── Abordagem mínima e correta para AR.js ──────────────────────────
           NÃO sobrescreva position/width/height do video ou canvas.
           O AR.js gerencia isso internamente via o atributo 'embedded'.
           Apenas configure body e o overlay de UI.
        ─────────────────────────────────────────────────────────────────── */

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', -apple-system, sans-serif;
        }

        /* a-scene ocupa 100% do body — o AR.js cuida do resto */
        a-scene {
            display: block;
            width: 100vw;
            height: 100dvh;
        }

        /* UI overlay — acima de tudo */
        #ui-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
        }

        #top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: max(env(safe-area-inset-top, 0px), 0.75rem) 1rem 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
        }

        .logo {
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
        }
        .logo span { color: #6366f1; }

        #status-badge {
            background: rgba(99,102,241,0.2);
            border: 1px solid rgba(99,102,241,0.5);
            color: #a5b4fc;
            font-size: clamp(0.65rem, 2vw, 0.75rem);
            padding: 0.35rem 0.7rem;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.4s;
            max-width: 55vw;
            text-align: center;
        }
        #status-badge.found {
            background: rgba(34,197,94,0.2);
            border-color: rgba(34,197,94,0.5);
            color: #86efac;
        }

        #anim-badge {
            margin-top: 0.5rem;
            background: rgba(244,114,182,0.15);
            border: 1px solid rgba(244,114,182,0.4);
            color: #fbcfe8;
            font-size: 0.65rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.4s;
            display: none; /* Escondido até o modelo carregar */
        }
        #anim-badge.ready {
            background: rgba(99,102,241,0.25);
            border-color: rgba(99,102,241,0.5);
            color: #c7d2fe;
        }
        #anim-badge.error {
            background: rgba(239,68,68,0.2);
            border-color: rgba(239,68,68,0.5);
            color: #fca5a5;
        }

        #hint {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 5.5rem);
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: clamp(0.72rem, 2.5vw, 0.85rem);
            background: rgba(0,0,0,0.6);
            padding: 0.55rem 1rem;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            white-space: nowrap;
            transition: opacity 0.4s;
        }

        #bottom-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 0.8rem 1rem max(env(safe-area-inset-bottom, 0.8rem), 0.8rem);
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
        }

        .btn {
            pointer-events: all;
            background: rgba(99,102,241,0.35);
            border: 1px solid rgba(99,102,241,0.6);
            color: #fff;
            padding: 0.65rem 1.1rem;
            border-radius: 12px;
            font-size: clamp(0.75rem, 2.5vw, 0.85rem);
            font-family: inherit;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: background 0.25s;
            min-height: 44px;
            display: flex;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(99,102,241,0.65); }

        #scan-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(160px, 45vw, 220px);
            height: clamp(160px, 45vw, 220px);
            border: 2px solid rgba(99,102,241,0.5);
            border-radius: 50%;
            animation: pulse-ring 2s ease-out infinite;
        }
        #scan-ring::after {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(99,102,241,0.25);
            border-radius: 50%;
        }
        @keyframes pulse-ring {
            0%   { transform: translate(-50%,-50%) scale(0.85); opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
        }
        #scan-ring.hidden { display: none; }
    </style>
</head>
<body>

    <!-- ── A-Frame AR Scene ─────────────────────────────────────────────── -->
    <!-- embedded = obrigatório para o AR.js gerenciar câmera corretamente  -->
    <!-- renderer alpha:true = canvas transparente sobre o vídeo da câmera  -->
    <a-scene
        embedded
        vr-mode-ui="enabled: false"
        renderer="antialias: true; alpha: true;"
        arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.5;"
        gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
    >
        <!-- ── Assets ────────────────────────────────────────────────── -->
        <a-assets>
            <a-asset-item id="glb-model" src="nugg_motion_GLB2.0.glb"></a-asset-item>
        </a-assets>


        <!-- ── Marcador HIRO ─────────────────────────────────────────── -->
        <a-marker type="pattern" url="./hiro.patt" id="hiro-marker"
            smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">

            <!-- Modelo 3D GLB -->
            <a-entity
                id="model-3d"
                gltf-model="#glb-model"
                position="0 0.5 0"
                scale="0.5 0.5 0.5"
                animation-mixer="clip: *; loop: repeat; timeScale: 1;"
            >
            </a-entity>

            <!-- Brilho na base (opcional) -->
            <a-light type="point" color="#6366f1" intensity="1.5" distance="2" position="0 0.5 0"></a-light>

        </a-marker>
        <!-- ──────────────────────────────────────────────────────────── -->

        <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.8" position="1 3 1"></a-light>

        <a-entity camera></a-entity>
    </a-scene>

    <!-- ── UI Overlay ───────────────────────────────────────────────── -->
    <div id="ui-overlay">
        <div id="top-bar" style="flex-direction: column; align-items: flex-end;">
            <div style="display: flex; width: 100%; justify-content: space-between; align-items: center;">
                <div class="logo">Vision<span>3D</span></div>
                <div id="status-badge">🔍 Buscando marcador...</div>
            </div>
            <div id="anim-badge">⏳ Verificando animação...</div>
        </div>

        <div id="scan-ring"></div>

        <div id="hint">📄 Aponte para o marcador HIRO impresso</div>

        <div id="bottom-bar">
            <button class="btn" onclick="window.location.href='marker.html'">🖨️ Ver Marcador</button>
            <button class="btn" onclick="window.location.href='index.html'">← Voltar</button>
        </div>
    </div>

    <script>
        const marker = document.getElementById('hiro-marker');
        const badge  = document.getElementById('status-badge');
        const ring   = document.getElementById('scan-ring');
        const hint   = document.getElementById('hint');

        marker.addEventListener('markerFound', () => {
            badge.innerText = '✓ Marcador detectado!';
            badge.classList.add('found');
            ring.classList.add('hidden');
            hint.style.opacity = '0';
        });

        marker.addEventListener('markerLost', () => {
            badge.innerText = '🔍 Buscando marcador...';
            badge.classList.remove('found');
            ring.classList.remove('hidden');
            hint.style.opacity = '1';
        });

        // Script de Diagnóstico e Ativação de Animação
        const modelEntity = document.getElementById('model-3d');
        const animBadge   = document.getElementById('anim-badge');

        modelEntity.addEventListener('model-loaded', (e) => {
            const model = e.detail.model;
            const animations = model.animations;
            
            animBadge.style.display = 'block';

            if (animations && animations.length > 0) {
                const firstAnimName = animations[0].name;
                animBadge.innerText = `🎬 Animação: "${firstAnimName}" OK`;
                animBadge.classList.add('ready');
                
                // Força o início da animação específica pelo NOME
                modelEntity.setAttribute('animation-mixer', {
                    clip: firstAnimName,
                    loop: 'repeat',
                    timeScale: 2
                });
                
                console.log(`✅ Animando clipe: ${firstAnimName}`);
            } else {
                animBadge.innerText = '⚠️ Sem dados de animação';
                animBadge.classList.add('error');
                console.warn("❌ Modelo sem animação.");
            }
        });
    </script>
</body>
</html>
